<!doctype html>
<meta charset="utf-8">

<style>
  pre {
    width: 600px;
    white-space: pre-wrap;
  }
</style>
<div></div>
<script>
  function add(title, contents) {
    var h1 = document.createElement("h1")
    h1.innerHTML = title

    var pre = document.createElement("pre")
    pre.innerHTML = JSON.stringify(contents, null, "  ")

    var hr = document.createElement("hr")

    document.body.appendChild(h1)
    document.body.appendChild(pre)
    document.body.appendChild(hr)

  }

  var obj = {}
  var navigator_keys = [
    "appCodeName",
    "appName",
    "appVersion",
    "cookieEnabled",
    "credentials",
    "doNotTrack",
    "geolocation",
    "hardwareConcurrency",
    "language",
    "languages",
    "maxTouchPoints",
    "mediaDevices",
    "mimeTypes",
    "onLine",
    "permissions",
    "platform",
    "plugins",
    "presentation",
    "product",
    "productSub",
    "serviceWorker",
    "storage",
    "userAgent",
    "vendor",
    "vendorSub",
  ]
  navigator_keys.forEach(function (e) {
    obj[e] = navigator[e]
  })

  add("navigator", obj)

</script>
